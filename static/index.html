<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Media Player</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; }
        header h1 { font-size: 2rem; margin-bottom: 8px; }
        header p { color: #aaa; }
        .tabs { display: flex; gap: 0; justify-content: center; margin: 20px 0; }
        .tab { padding: 10px 32px; border: none; background: #1a1a1a; color: #888; font-size: 16px; cursor: pointer; font-weight: 600; border-radius: 24px; transition: all 0.2s; }
        .tab.active { background: #f00; color: #fff; }
        .tab:first-child { border-radius: 24px 0 0 24px; }
        .tab:last-child { border-radius: 0 24px 24px 0; }
        .tab:not(:first-child):not(:last-child) { border-radius: 0; }

        .results { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #1a1a1a; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
        .card:hover { transform: scale(1.03); }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #333; }
        .card-body { padding: 12px; }
        .card-title { font-size: 14px; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-channel { font-size: 12px; color: #aaa; margin-top: 6px; }
        .card-stats { font-size: 12px; color: #888; margin-top: 4px; }

        .reels-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 500; display: none; }
        .reels-overlay.active { display: block; }
        .reels-scroll { width: 100%; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reels-scroll::-webkit-scrollbar { display: none; }
        .reel { position: relative; width: 100%; height: 100vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
        .reel video { width: 100%; height: 100%; object-fit: contain; }
        .reel-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 60px 20px 30px; background: linear-gradient(transparent, rgba(0,0,0,0.85)); pointer-events: none; }
        .reel-info .title { font-size: 15px; font-weight: 600; }
        .reel-info .channel { font-size: 13px; color: #ccc; margin-top: 4px; }
        .reel-loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; border: 3px solid #333; border-top-color: #f00; border-radius: 50%; animation: spin 0.8s linear infinite; }

        .spinner { display: none; text-align: center; padding: 40px; }
        .spinner.active { display: block; }
        .spinner::after { content: ""; display: inline-block; width: 40px; height: 40px; border: 4px solid #333; border-top-color: #f00; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .player-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .player-overlay.active { display: flex; }
        .player-wrapper { width: 90%; max-width: 960px; aspect-ratio: 16/9; }
        .player-wrapper video { width: 100%; height: 100%; border: none; border-radius: 12px; }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 32px; color: #fff; cursor: pointer; background: none; border: none; }
        .error { color: #ff4444; text-align: center; padding: 20px; display: none; }
        .no-results { text-align: center; padding: 40px; color: #888; display: none; }
        .sentinel { height: 20px; }
    </style>
</head>
<body>
    <div class="container" id="mainContent">
        <header>
            <h1>YouTube Media Player</h1>
            <p>Discover music & dance videos across Indian languages</p>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('music')">Music</button>
            <button class="tab" onclick="switchTab('dance')">Dance</button>
        </div>

        <div class="spinner" id="spinner"></div>
        <div class="error" id="error"></div>
        <div class="no-results" id="noResults">No videos found.</div>
        <div id="results"></div>
        <div class="sentinel" id="sentinel"></div>
    </div>

    <div class="reels-overlay" id="reelsOverlay">
        <div class="reels-scroll" id="reelsScroll"></div>
    </div>

    <div class="player-overlay" id="playerOverlay">
        <button class="close-btn" onclick="closePlayer()">&times;</button>
        <div class="player-wrapper">
            <video id="playerVideo" controls autoplay style="width:100%;height:100%;border-radius:12px;background:#000;"></video>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let currentTab = 'music';
        let currentPage = 1;
        let isLoading = false;
        let hasMore = true;
        let loadedIds = new Set();
        let reelObserver = null;

        async function loadVideos(reset = false) {
            if (isLoading) return;
            if (!hasMore && !reset) return;
            isLoading = true;

            if (reset) {
                currentPage = 1;
                loadedIds.clear();
                hasMore = true;
                document.getElementById('results').innerHTML = '';
                document.getElementById('reelsScroll').innerHTML = '';
            }

            const spinner = document.getElementById('spinner');
            const error = document.getElementById('error');
            const noResults = document.getElementById('noResults');
            error.style.display = 'none';
            noResults.style.display = 'none';
            spinner.classList.add('active');

            try {
                const res = await fetch(`${API_BASE}/${currentTab}?page=${currentPage}&per_query=8`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                spinner.classList.remove('active');

                if (data.count === 0) {
                    if (reset) noResults.style.display = 'block';
                    hasMore = false;
                    isLoading = false;
                    return;
                }

                if (currentTab === 'music') {
                    renderMusicGrid(data.results);
                } else {
                    renderDanceReels(data.results);
                }
                currentPage++;
                isLoading = false;

                if (sentinel.getBoundingClientRect().top < window.innerHeight + 500) {
                    loadVideos();
                }
            } catch (err) {
                spinner.classList.remove('active');
                error.textContent = 'Error: ' + err.message;
                error.style.display = 'block';
                isLoading = false;
            }
        }

        function renderMusicGrid(videos) {
            const el = document.getElementById('results');
            el.className = 'results';
            videos.forEach(video => {
                if (loadedIds.has(video.id)) return;
                loadedIds.add(video.id);
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => playVideo(video.id);
                card.innerHTML = `
                    <img src="https://i.ytimg.com/vi/${video.id}/hqdefault.jpg" loading="lazy"
                         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22180%22><rect fill=%22%23333%22 width=%22320%22 height=%22180%22/><text fill=%22%23888%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22>No thumbnail</text></svg>'">
                    <div class="card-body">
                        <div class="card-title">${video.title}</div>
                        <div class="card-channel">${video.channel || 'Unknown'}</div>
                        <div class="card-stats">${formatDuration(video.duration)} &bull; ${formatViews(video.view_count)} views</div>
                    </div>`;
                el.appendChild(card);
            });
        }

        function renderDanceReels(videos) {
            const scrollEl = document.getElementById('reelsScroll');
            videos.forEach(video => {
                if (loadedIds.has(video.id)) return;
                loadedIds.add(video.id);
                const reel = document.createElement('div');
                reel.className = 'reel';
                reel.innerHTML = `
                    <div class="reel-loader"></div>
                    <video loop playsinline preload="metadata"
                        src="${API_BASE}/stream?url=${encodeURIComponent(`https://www.youtube.com/watch?v=${video.id}`)}"
                        onerror="this.parentElement.innerHTML='<div style=color:#888;text-align:center;padding:20px>Failed to load</div>'"></video>
                    <div class="reel-info">
                        <div class="title">${video.title}</div>
                        <div class="channel">${video.channel || 'Unknown'}</div>
                    </div>`;
                scrollEl.appendChild(reel);
            });
            setupReelObserver();
        }

        function setupReelObserver() {
            if (reelObserver) reelObserver.disconnect();
            reelObserver = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (!video) return;
                    if (entry.isIntersecting) {
                        video.play().catch(() => {});
                    } else {
                        video.pause();
                    }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.reel').forEach(r => reelObserver.observe(r));
        }

        function switchTab(tab) {
            if (tab === currentTab) return;
            if (reelObserver) { reelObserver.disconnect(); reelObserver = null; }
            currentTab = tab;

            const main = document.getElementById('mainContent');
            const overlay = document.getElementById('reelsOverlay');

            if (tab === 'dance') {
                main.style.display = 'none';
                overlay.classList.add('active');
            } else {
                main.style.display = 'block';
                overlay.classList.remove('active');
            }

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
            loadVideos(true);
        }

        function playVideo(videoId) {
            const overlay = document.getElementById('playerOverlay');
            const video = document.getElementById('playerVideo');
            const videoUrl = `https://www.youtube.com/watch?v=${videoId}`;
            video.src = `${API_BASE}/stream?url=${encodeURIComponent(videoUrl)}`;
            video.load();
            video.play();
            overlay.classList.add('active');
        }

        function closePlayer() {
            const overlay = document.getElementById('playerOverlay');
            const video = document.getElementById('playerVideo');
            video.pause();
            video.src = '';
            overlay.classList.remove('active');
        }

        function formatDuration(seconds) {
            if (!seconds) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function formatViews(count) {
            if (!count) return '0';
            if (count >= 10000000) return (count / 10000000).toFixed(1) + 'Cr';
            if (count >= 100000) return (count / 100000).toFixed(1) + 'L';
            if (count >= 1000) return (count / 1000).toFixed(1) + 'K';
            return count.toLocaleString();
        }

        const sentinel = document.getElementById('sentinel');
        const observer = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting && !isLoading && hasMore) {
                loadVideos();
            }
        }, { rootMargin: '300px' });
        observer.observe(sentinel);

        loadVideos(true);
    </script>
</body>
</html>
